name: Tests

on:
  push:
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Repository checks
        run: php tests/static-check.php
      - name: Delete form fallback
        run: php tests/delete-fallback.php
      - name: JavaScript syntax
        run: node --check static/interactionAnalytics.js && node --check static/configure.js
      - name: Delete configuration UX
        run: node tests/delete-ux.node.js
      - name: FreshRSS 1.29.1 read-state fallback
        run: node tests/read-state-fallback.node.js
      - name: FreshRSS global-context initialization race
        run: node tests/init-race.node.js
      - name: Active-time leave boundary
        run: node tests/active-time-boundary.node.js
      - name: Normal-view title link detection
        run: node tests/publisher-link-detection.node.js
